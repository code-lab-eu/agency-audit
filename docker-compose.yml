services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agency_audit
      POSTGRES_PASSWORD: agency_audit
      POSTGRES_DB: agency_audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agency_audit"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      AGENCY_AUDIT_PG_HOST: postgres
      AGENCY_AUDIT_PG_PORT: "5432"
      AGENCY_AUDIT_PG_USER: agency_audit
      AGENCY_AUDIT_PG_PASSWORD: agency_audit
      AGENCY_AUDIT_PG_DATABASE: agency_audit
      AGENCY_AUDIT_GOOGLE_MAPS_API_KEY: ""
      AGENCY_AUDIT_GEONAMES_MIN_POPULATION: "50000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
