name: CI — Docker Compose

on:
  pull_request:
    branches: [master]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'requirements.txt'
      - '.dockerignore'
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/docker-compose-ci.yml'

jobs:
  test-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build

      - name: Start services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          # Wait for app to be healthy (up to 60s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "App is healthy"
              break
            fi
            echo "Waiting for app to be healthy... ($i/30)"
            sleep 2
          done
          # Final health check
          curl -f http://localhost:8000/health || {
            echo "App failed to become healthy"
            docker compose logs
            exit 1
          }

      - name: Initialize database
        run: |
          docker compose exec -T app agency-audit db-init
          docker compose exec -T app agency-audit seed-countries

      - name: Seed test cities
        run: |
          docker compose exec -T postgres psql -U agency_audit -d agency_audit <<'SQL'
          INSERT INTO cities (country, label, slug, population, latitude, longitude) VALUES
            ('BG', 'Sofia', 'sofia', 1286383, 42.6977, 23.3219),
            ('BG', 'Plovdiv', 'plovdiv', 346893, 42.1354, 24.7453),
            ('BG', 'Varna', 'varna', 334870, 43.2141, 27.9147),
            ('BG', 'Burgas', 'burgas', 200271, 42.5048, 27.4626),
            ('BG', 'Ruse', 'ruse', 149642, 43.8560, 25.9785),
            ('BG', 'Stara Zagora', 'stara-zagora', 138272, 42.4258, 25.6345),
            ('BG', 'Pleven', 'pleven', 106954, 43.4170, 24.6063),
            ('BG', 'Dobrich', 'dobrich', 91030, 43.5726, 27.8273),
            ('BG', 'Sliven', 'sliven', 91470, 42.6814, 26.3287),
            ('BG', 'Shumen', 'shumen', 80855, 43.2714, 26.9228),
            ('BG', 'Pernik', 'pernik', 80191, 42.6052, 23.0339),
            ('BG', 'Yambol', 'yambol', 74132, 42.4842, 26.5035),
            ('BG', 'Haskovo', 'haskovo', 76397, 41.9344, 25.5550),
            ('BG', 'Pazardzhik', 'pazardzhik', 75846, 42.1928, 24.3336),
            ('BG', 'Blagoevgrad', 'blagoevgrad', 70881, 42.0219, 23.0963),
            ('BG', 'Veliko Tarnovo', 'veliko-tarnovo', 68783, 43.0757, 25.6172),
            ('BG', 'Vratsa', 'vratsa', 60682, 43.2102, 23.5622),
            ('BG', 'Gabrovo', 'gabrovo', 58950, 42.8747, 25.3342),
            ('BG', 'Vidin', 'vidin', 48071, 43.9900, 22.8725),
            ('BG', 'Kardzhali', 'kardzhali', 43880, 41.6338, 25.3777)
          ON CONFLICT (country, slug) DO NOTHING;
          SQL

      - name: Install project in editable mode (for source-level coverage)
        run: |
          docker compose exec -T --user root app /opt/venv/bin/pip install --no-deps --no-build-isolation -e /workspace

      - name: Install test dependencies
        run: |
          docker compose exec -T --user root app /opt/venv/bin/pip install \
            pytest \
            pytest-asyncio \
            pytest-cov \
            coverage \
            hypothesis

      # Run from the mounted source at /workspace so coverage resolves the
      # relative paths in pyproject.toml's [tool.coverage] config.
      - name: Run tests with coverage
        run: |
          docker compose exec -T --workdir /workspace app pytest \
            --cov=src/agency_audit \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            tests/

      - name: Coverage summary
        if: always()
        run: |
          echo "## Docker Compose Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker compose exec -T --workdir /workspace app coverage report 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Docker logs on failure
        if: failure()
        run: |
          echo "## Docker Compose Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker compose logs 2>&1 | tail -100 | tee -a $GITHUB_STEP_SUMMARY
          echo '```'
