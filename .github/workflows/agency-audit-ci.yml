name: CI — Agency Audit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

  test:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up test database
        env:
          AGENCY_AUDIT_PG_HOST: localhost
          AGENCY_AUDIT_PG_PORT: 5432
          AGENCY_AUDIT_PG_USER: testuser
          AGENCY_AUDIT_PG_PASSWORD: testpass
          AGENCY_AUDIT_PG_DATABASE: testdb
        run: python scripts/seed-test-db.py

      - name: Run tests with coverage
        env:
          AGENCY_AUDIT_PG_HOST: localhost
          AGENCY_AUDIT_PG_PORT: 5432
          AGENCY_AUDIT_PG_USER: testuser
          AGENCY_AUDIT_PG_PASSWORD: testpass
          AGENCY_AUDIT_PG_DATABASE: testdb
        run: |
          pytest \
            --cov=src/agency_audit \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            tests/

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
