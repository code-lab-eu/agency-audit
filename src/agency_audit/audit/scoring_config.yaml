# Scoring configuration for agency-audit website audits.
#
# Adjust these weights to change how websites are scored.
# Score is a signed integer (0-100 typical, negative for unsuitable sites).
# Higher = better candidate for Real Estate Radar inclusion.

# robots.txt — most important gate
robots_allows: 20
robots_disallows: -50

# anti-scraping — penalty
has_anti_scraping: -20

# API detection — bonus for having a structured API
has_api: 20
has_graphql_api: 25  # extra bonus for GraphQL

# property count — tiered (first matching tier is applied, higher = more points)
property_count_tiers:
  - min: 1000
    points: 30
  - min: 500
    points: 20
  - min: 100
    points: 10
  - min: 10
    points: 5

# listing quality — each check adds points
has_structured_data: 10
listings_have_prices: 10
listings_have_locations: 10
listings_have_images: 5
listings_have_descriptions: 5
has_property_map: 5

# performance
response_time_fast: 5   # < 500ms
response_time_slow: -5  # > 3000ms

# SSL
ssl_valid: 5
ssl_invalid: -20

# clamp range
min_score: -100
max_score: 100
