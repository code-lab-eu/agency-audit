{% if activity %}
<table class="table table-sm table-hover mb-0">
    <thead class="table-light">
        <tr><th>When</th><th>Agent</th><th>City</th><th>Query</th><th>Status</th></tr>
    </thead>
    <tbody>
        {% for a in activity %}
        <tr>
            <td class="small text-muted">{{ a.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
            <td><code>{{ a.agent or '—' }}</code></td>
            <td>{{ a.city_label or '—' }}</td>
            <td class="small text-truncate" style="max-width:250px;" title="{{ a.search_query }}">
                {{ a.search_query or '—' }}
            </td>
            <td>{{ a.status | status_badge }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted text-center py-4">No recent activity</p>
{% endif %}
