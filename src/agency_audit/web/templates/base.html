<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agency Audit{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        .text-success { color: #198754 !important; }
        .text-warning { color: #ffc107 !important; }
        .text-danger  { color: #dc3545 !important; }
        .text-secondary { color: #6c757d !important; }
        .sidebar { min-height: 100vh; background: #212529; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #343a40; border-radius: .25rem; }
        .sidebar .nav-link i { width: 20px; text-align: center; }
        .main-content { padding: 1.5rem; }
        .stat-card { transition: transform .15s; }
        .stat-card:hover { transform: translateY(-2px); }
        .progress { height: 8px; }
        .table-hover tbody tr:hover { cursor: pointer; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar col-md-2 d-none d-md-block p-3 position-fixed">
            <h5 class="text-white mb-4">🏢 Agency Audit</h5>
            <ul class="nav flex-column">
                <li class="nav-item mb-1">
                    <a class="nav-link {{ 'active' if page == 'overview' }}" href="/">
                        📊 Overview
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a class="nav-link {{ 'active' if page == 'countries' }}" href="/countries">
                        🌍 Countries
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a class="nav-link {{ 'active' if page == 'discovery' }}" href="/discovery">
                        🔍 Discovery Queue
                    </a>
                </li>
            </ul>
            <hr class="text-secondary">
            <div class="text-secondary small">
                <a href="/api/stats" class="nav-link">📡 API</a>
                <a href="/api/docs" class="nav-link">📖 API Docs</a>
            </div>
        </nav>
        <main class="col-md-10 offset-md-2 main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
